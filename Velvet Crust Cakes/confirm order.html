<!DOCTYPE html>
<html>
<head>
  <title>Confirm Order</title>
  <link rel="stylesheet" href="confirm order.css">
</head>
<body>

<header>
  <img src="logo.webp" alt="Velvet Crust Logo" width="100" height="100">
</header>

<h1>Order Summary</h1>

<div class="summary" id="summary"></div>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="goHome()">Cancel</button>
</div>

<script>
window.onload = function(){
  const summary = `
    <p><strong>Design:</strong> ${localStorage.getItem("cake")}</p>
    <p><strong>Flavor:</strong> ${localStorage.getItem("flavor")}</p>
    <p><strong>Filling:</strong> ${localStorage.getItem("filling")}</p>
    <p><strong>Size:</strong> ${localStorage.getItem("size")}</p>
    <p><strong>Date:</strong> ${localStorage.getItem("date")}</p>
    <p><strong>Time:</strong> ${localStorage.getItem("time")}</p>
  `;

  document.getElementById("summary").innerHTML = summary;
}

function confirmOrder(){
  alert("🎉 Order Confirmed!");
  localStorage.clear();
  window.location.href = "home.html";
}

function goHome(){
  window.location.href = "home.html";
}
</script>

</body>
</html>
