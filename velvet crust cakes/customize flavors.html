<!DOCTYPE html>
<html>
<head>
  <title>Customize Flavors</title>
  <link rel="stylesheet" href="customize flavors.css">
</head>
<body>

<header>
  <img src="logo.webp" alt="Velvet Crust Logo" width="100" height="100">
</header>


<div class="container">
  <h1>Customize Your Cake</h1>

  <div class="card">
    <label>Flavor</label>
    <select>
      <option>Chocolate</option>
      <option>Vanilla</option>
      <option>Red Velvet</option>
    </select>

    <label>Filling</label>
    <select>
      <option>Strawberry</option>
      <option>Caramel</option>
      <option>Lemon Curd</option>
      <option>Vanilla Custard</option>
      <option>Cream Cheese</option>
      <option>Chocolate Fudge</option>
    </select>

    <label>Size</label>
    <select>
      <option>Small</option>
      <option>Medium</option>
      <option>Large</option>
    </select>

    <label>Tier</label>
    <select>
      <option>Single Tier</option>
      <option>Two Tier</option>
      <option>Three Tier</option>
    </select>

    <button onclick="saveCustomization()">Save</button>
  </div>
</div>

<script>
function saveCustomization(){
  const selects = document.querySelectorAll("select");

  localStorage.setItem("flavor", selects[0].value);
  localStorage.setItem("filling", selects[1].value);
  localStorage.setItem("size", selects[2].value);

  window.location.href = "pick date.html";
}
</script>

</body>
</html>
