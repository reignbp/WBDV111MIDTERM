<!DOCTYPE html>
<html>
<head>
  <title>Browse Designs - Velvet Crust</title>
  <link rel="stylesheet" href="browse designs.css">
</head>
<body>

<header>
  <img src="logo.webp" alt="Velvet Crust Logo" width="100" height="100">
  <p>Choose your perfect cake design</p>
</header>

<section class="designs">
  <div class="design-card">
    <img src="velvet.jpg" alt="Classic Velvet" width="200" height="150">
    <h3>Classic Velvet</h3>
    <button onclick="selectCake('Classic Velvet')">Select</button>
  </div>

  <div class="design-card chocolate">
    <img src="choco.jpg" alt="Chocolate Dream" width="200" height="150">
    <h3>Chocolate Dream</h3>
    <button onclick="selectCake('Chocolate Dream')">Select</button>
  </div>

  <div class="design-card strawberry">
    <img src="berry.jpg" alt="Berry Bliss" width="200" height="150">
    <h3>Berry Bliss</h3>
    <button onclick="selectCake('Berry Bliss')">Select</button>
  </div>
</section>
<script>
function selectCake(cake){
  localStorage.setItem("cake", cake);
  window.location.href = "customize flavors.html";
}
</script>
</body>
</html>
