<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FixIt Desk Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="terminal-body">

<div class="terminal-box">
    <p>> FIXIT_DESK</p>
    <p>> INITIALIZING SECURE ACCESS...</p>
    <hr>

    <label>USER_ID:</label>
    <input type="text" id="user">

    <label>PASSWORD:</label>
    <input type="password" id="pass">

    <button onclick="login()">[ EXECUTE_LOGIN ]</button>

    <p class="warning">* UNAUTHORIZED ACCESS PROHIBITED</p>
</div>

<script src="script.js"></script>
</body>
</html>
