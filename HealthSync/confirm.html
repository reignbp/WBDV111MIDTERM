<h3>Thank you for booking with HealthSync!</h3>
<h4>Your appointment details are as follows:</h4>
<p id="summary"></p>

<button id="saveHistory">Save to History</button>

<script src="script.js"></script>
<script>

  document.addEventListener("DOMContentLoaded", function() {
    const summary = document.getElementById("summary");
    summary.innerHTML =
      "Specialty: " + localStorage.getItem("spec") + "<br>" +
      "Doctor: " + localStorage.getItem("doc") + "<br>" +
      "Date: " + localStorage.getItem("date") + "<br>" +
      "Time: " + localStorage.getItem("time");

    const btn = document.getElementById("saveHistory");
    if(btn) btn.addEventListener("click", finish);
  });
</script>
